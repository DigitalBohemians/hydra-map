<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <title>AR Map – Hydra</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --gold: #c9a84c;
      --gold-light: #f0d080;
      --sea: #0a2a3a;
      --text: #e8dfc8;
      --accent: #00ffcc;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--sea); color: var(--text); font-family: 'Cormorant Garamond', serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
    header { position: relative; z-index: 1000; padding: 18px 24px 14px; background: linear-gradient(180deg, rgba(5,18,28,0.98) 0%, rgba(5,18,28,0.85) 100%); border-bottom: 1px solid rgba(201,168,76,0.3); display: flex; align-items: center; gap: 16px; }
    .logo-mark { width: 42px; height: 42px; border: 2px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; animation: pulse-ring 3s ease-in-out infinite; }
    @keyframes pulse-ring { 0%, 100% { box-shadow: 0 0 0 0 rgba(201,168,76,0.4); } 50% { box-shadow: 0 0 0 8px rgba(201,168,76,0); } }
    .header-text h1 { font-size: 22px; font-weight: 600; letter-spacing: 0.05em; color: var(--gold-light); line-height: 1.1; }
    .header-text p { font-size: 12px; font-family: 'Space Mono', monospace; color: rgba(232,223,200,0.5); letter-spacing: 0.08em; margin-top: 2px; }
    #map { flex: 1; width: 100%; position: relative; }
    .leaflet-popup-content-wrapper { background: rgba(5,18,28,0.97) !important; border: 1px solid var(--gold) !important; border-radius: 12px !important; box-shadow: 0 8px 32px rgba(0,0,0,0.6) !important; color: var(--text) !important; font-family: 'Cormorant Garamond', serif !important; }
    .leaflet-popup-tip-container { display: none; }
    .leaflet-popup-close-button { color: var(--gold) !important; font-size: 18px !important; top: 10px !important; right: 12px !important; }
    .popup-inner { padding: 4px 8px 8px; min-width: 220px; }
    .popup-tag { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--accent); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 6px; }
    .popup-inner h2 { font-size: 20px; font-weight: 600; color: var(--gold-light); margin-bottom: 6px; }
    .popup-inner p { font-size: 14px; color: rgba(232,223,200,0.75); margin-bottom: 14px; line-height: 1.5; font-style: italic; }
    .popup-coords { font-family: 'Space Mono', monospace; font-size: 10px; color: rgba(232,223,200,0.4); margin-bottom: 14px; }
    .ar-btn { display: block; width: 100%; padding: 12px; background: linear-gradient(135deg, var(--gold) 0%, #a07830 100%); color: #0a1a28; text-align: center; text-decoration: none; font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700; letter-spacing: 0.1em; border-radius: 8px; }
    .custom-marker { width: 36px; height: 36px; border-radius: 50% 50% 50% 0; transform: rotate(-45deg); border: 2px solid var(--gold); display: flex; align-items: center; justify-content: center; position: relative; }
    .custom-marker.teal { background: rgba(0,255,204,0.2); border-color: var(--accent); }
    .custom-marker.gold { background: rgba(201,168,76,0.2); border-color: var(--gold); }
    .custom-marker::after { content: ''; width: 8px; height: 8px; border-radius: 50%; background: var(--accent); position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(45deg); }
    .custom-marker.gold::after { background: var(--gold); }
    .legend { position: absolute; bottom: 24px; left: 16px; z-index: 800; background: rgba(5,18,28,0.92); border: 1px solid rgba(201,168,76,0.3); border-radius: 10px; padding: 12px 16px; }
    .legend-title { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 0.15em; color: rgba(232,223,200,0.4); margin-bottom: 8px; text-transform: uppercase; }
    .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 13px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot-teal { background: var(--accent); }
    .dot-gold { background: var(--gold); }
    .leaflet-tile { filter: brightness(0.55) saturate(0.7) hue-rotate(180deg); }
  </style>
</head>
<body>

<header>
  <div class="logo-mark">🗺</div>
  <div class="header-text">
    <h1>AR Experience – Hydra</h1>
    <p>DIGITALBOHEMIANS · AUGMENTED REALITY MAP</p>
  </div>
</header>

<div id="map"></div>

<script>
  const map = L.map('map', { center: [37.3510, 23.4645], zoom: 15 });

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap', maxZoom: 19
  }).addTo(map);

  const locations = [
    {
      lat: 37.35158, lng: 23.46232,
      title: "Hydronetta",
      tag: "AR · LOCATION 01",
      desc: "Tauche ein in die erweiterte Realität direkt am Wasser der Hydronetta.",
      coords: "37.35158° N, 23.46232° E",
      url: "https://digitalbohemians.github.io/ar3d-location/",
      color: "teal"
    },
    {
      lat: 37.35033, lng: 23.46693,
      title: "Hydra Kunst",
      tag: "AR · LOCATION 02",
      desc: "Die Kunst im Code – ein AR-Erlebnis mitten im Herzen von Hydra.",
      coords: "37.35033° N, 23.46693° E",
      url: "https://digitalbohemians.github.io/AR-Hydra/",
      color: "gold"
    }
  ];

  locations.forEach((loc, i) => {
    const icon = L.divIcon({
      className: '',
      html: `<div class="custom-marker ${loc.color}"></div>`,
      iconSize: [36, 36], iconAnchor: [10, 36], popupAnchor: [8, -36]
    });

    const marker = L.marker([loc.lat, loc.lng], { icon }).addTo(map);
    marker.bindPopup(`
      <div class="popup-inner">
        <div class="popup-tag">${loc.tag}</div>
        <h2>${loc.title}</h2>
        <p>${loc.desc}</p>
        <div class="popup-coords">📍 ${loc.coords}</div>
        <a class="ar-btn" href="${loc.url}" target="_blank">▶ AR STARTEN</a>
      </div>
    `, { maxWidth: 280 });

    if (i === 0) setTimeout(() => marker.openPopup(), 800);
  });

  const legendEl = document.createElement('div');
  legendEl.className = 'legend';
  legendEl.innerHTML = `
    <div class="legend-title">AR Locations</div>
    <div class="legend-item"><span class="legend-dot dot-teal"></span> Hydronetta</div>
    <div class="legend-item"><span class="legend-dot dot-gold"></span> Hydra Kunst</div>
  `;
  document.getElementById('map').appendChild(legendEl);
</script>

</body>
</html>
