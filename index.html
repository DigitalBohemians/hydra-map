<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <title>AR Map – Hydra</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #ffffff;
      --dark: #1a1a1a;
      --text-muted: rgba(26,26,26,0.45);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--dark);
      font-family: 'DM Sans', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      position: relative;
      z-index: 1000;
      padding: 16px 20px;
      background: #fff;
      border-bottom: 1px solid rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .header-text h1 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--dark);
    }

    .header-text p {
      font-size: 11px;
      font-weight: 400;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      margin-top: 1px;
    }

    #map { flex: 1; width: 100%; position: relative; }

    .locate-btn {
      position: absolute;
      bottom: 100px;
      right: 14px;
      z-index: 800;
      width: 44px;
      height: 44px;
      background: #fff;
      border: none;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: transform 0.15s;
    }

    .locate-btn:active { transform: scale(0.93); }

    .leaflet-popup-content-wrapper {
      background: #fff !important;
      border: none !important;
      border-radius: 16px !important;
      box-shadow: 0 8px 40px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06) !important;
      color: var(--dark) !important;
      font-family: 'DM Sans', sans-serif !important;
      padding: 0 !important;
      overflow: hidden;
    }

    .leaflet-popup-content { margin: 0 !important; }
    .leaflet-popup-tip-container { display: none; }
    .leaflet-popup-close-button {
      color: #1a1a1a !important;
      font-size: 20px !important;
      top: 12px !important;
      right: 14px !important;
      font-weight: 300 !important;
    }

    .popup-bar {
      height: 4px;
      background: linear-gradient(90deg, #ff6ec7, #a855f7, #22d3ee);
    }

    .popup-inner { padding: 16px 18px 18px; min-width: 230px; }

    .popup-tag {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .popup-inner h2 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--dark);
      margin-bottom: 6px;
    }

    .popup-inner p {
      font-size: 13px;
      color: rgba(26,26,26,0.6);
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .popup-coords {
      font-size: 10px;
      color: var(--text-muted);
      margin-bottom: 14px;
      font-weight: 500;
    }

    .ar-btn {
      display: block;
      width: 100%;
      padding: 13px;
      background: var(--dark);
      color: #fff;
      text-align: center;
      text-decoration: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.05em;
      border-radius: 10px;
      transition: opacity 0.2s;
    }

    .ar-btn:hover { opacity: 0.8; }

    .marker-outer {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #a855f7;
      border: 3px solid #1a1a1a;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    .marker-outer:active { transform: scale(0.88); }

    .marker-inner {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #1a1a1a;
      pointer-events: none;
    }

    .marker-outer.filled .marker-inner { background: #1a1a1a; }

    .my-location-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #3b82f6;
      border: 3px solid #fff;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.3);
      animation: pulse-blue 2s ease-in-out infinite;
    }

    @keyframes pulse-blue {
      0%, 100% { box-shadow: 0 0 0 3px rgba(59,130,246,0.3); }
      50% { box-shadow: 0 0 0 10px rgba(59,130,246,0.0); }
    }

    .legend {
      position: absolute;
      bottom: 20px;
      left: 14px;
      z-index: 800;
      background: #fff;
      border-radius: 12px;
      padding: 12px 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    .legend-title {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
      font-size: 12px;
      font-weight: 500;
      color: var(--dark);
    }

    .legend-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #a855f7;
      border: 2px solid #1a1a1a;
      box-sizing: border-box;
      flex-shrink: 0;
    }

    .legend-dot.white {
      background: #fff;
      border: 2px solid #a855f7;
      box-shadow: none;
    }

    .legend-dot.blue {
      background: #3b82f6;
      border: 2px solid #fff;
      box-shadow: 0 0 0 2px rgba(59,130,246,0.4);
    }

    .leaflet-tile { filter: grayscale(1) brightness(1.05); }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 60 44" fill="none" xmlns="http://www.w3.org/2000/svg" width="38" height="38">
      <defs>
        <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#ff6ec7"/>
          <stop offset="50%" stop-color="#a855f7"/>
          <stop offset="100%" stop-color="#22d3ee"/>
        </linearGradient>
      </defs>
      <circle cx="22" cy="22" r="21" fill="#1a1a1a"/>
      <circle cx="38" cy="22" r="20" fill="none" stroke="url(#g)" stroke-width="2.5"/>
    </svg>
  </div>
  <div class="header-text">
    <h1>AR Map – Hydra</h1>
    <p>DIGITALBOHEMIANS · AUGMENTED REALITY</p>
  </div>
</header>

<div id="map"></div>
<button class="locate-btn" id="locateBtn" title="Zu meinem Standort">🎯</button>

<script>
  // ── Hydra Map Analytics Tracker ──
  // Dashboard öffnen: Shift + M
  (function() {
    var STORE = 'hydra_map_analytics';

    function load() {
      try { return JSON.parse(localStorage.getItem(STORE) || 'null') || { markers: {}, links: [], sessions: 0 }; }
      catch(e) { return { markers: {}, links: [], sessions: 0 }; }
    }
    function save(d) {
      try { localStorage.setItem(STORE, JSON.stringify(d)); } catch(e) {}
    }

    var data = load();
    data.sessions = (data.sessions || 0) + 1;
    save(data);

    window._mapTrack = {
      markerClick: function(title, tag, coords) {
        var key = title + ' · ' + tag;
        data.markers[key] = (data.markers[key] || 0) + 1;
        data.links = data.links || [];
        save(data);
      },
      linkClick: function(title, url) {
        data.links = data.links || [];
        data.links.push({ title: title, url: url, ts: Date.now() });
        if (data.links.length > 200) data.links = data.links.slice(-200);
        save(data);
      }
    };

    function openDashboard() {
      var d = load();
      var existing = document.getElementById('hydra-map-dash');
      if (existing) { existing.remove(); return; }

      var markersSorted = Object.entries(d.markers || {}).sort(function(a,b){ return b[1]-a[1]; });
      var maxM = markersSorted.length > 0 ? markersSorted[0][1] : 1;

      // Link-Klicks zählen
      var linkCounts = {};
      (d.links || []).forEach(function(l) {
        var k = l.title + ' → ' + (l.url || '').replace('https://digitalbohemians.github.io/','');
        linkCounts[k] = (linkCounts[k] || 0) + 1;
      });
      var linksSorted = Object.entries(linkCounts).sort(function(a,b){ return b[1]-a[1]; });

      var markerBars = markersSorted.length === 0
        ? '<div style="color:#aaa;font-size:13px;padding:8px 0;">Noch keine Marker-Klicks.</div>'
        : markersSorted.map(function(e) {
            var pct = Math.round(e[1] / maxM * 100);
            return '<div style="margin-bottom:10px;">'
              + '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;">'
              + '<span style="color:#1a1a1a;flex:1;padding-right:8px;">' + e[0] + '</span>'
              + '<span style="color:#a855f7;font-weight:700;flex-shrink:0;">' + e[1] + '</span></div>'
              + '<div style="height:6px;background:#f0f0f0;border-radius:3px;overflow:hidden;">'
              + '<div style="height:100%;width:' + pct + '%;background:linear-gradient(90deg,#a855f7,#ec4899);border-radius:3px;"></div></div></div>';
          }).join('');

      var linkRows = linksSorted.length === 0
        ? '<div style="color:#aaa;font-size:13px;padding:8px 0;">Noch keine Link-Klicks.</div>'
        : linksSorted.map(function(e) {
            return '<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:12px;">'
              + '<span style="color:#555;flex:1;padding-right:8px;">' + e[0] + '</span>'
              + '<span style="color:#a855f7;font-weight:700;flex-shrink:0;">' + e[1] + '×</span></div>';
          }).join('');

      var dash = document.createElement('div');
      dash.id = 'hydra-map-dash';
      dash.style.cssText = 'position:fixed;top:0;right:0;bottom:0;width:360px;background:#fff;box-shadow:-4px 0 40px rgba(0,0,0,0.12);z-index:9999;overflow-y:auto;font-family:DM Sans,sans-serif;';

      dash.innerHTML = ''
        + '<div style="padding:20px 24px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between;">'
        + '<div><div style="font-size:9px;letter-spacing:0.18em;text-transform:uppercase;background:linear-gradient(90deg,#a855f7,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;">Map Analytics</div>'
        + '<div style="font-size:17px;font-weight:700;letter-spacing:-0.02em;">Hydra AR Map</div></div>'
        + '<button onclick="document.getElementById(\'hydra-map-dash\').remove()" style="background:none;border:1px solid #e0e0e0;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:13px;color:#888;">✕</button></div>'

        + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:1px;background:#f0f0f0;border-bottom:1px solid #f0f0f0;">'
        + '<div style="background:#fff;padding:16px;text-align:center;"><div style="font-size:11px;color:#aaa;margin-bottom:4px;">Sessions</div><div style="font-size:22px;font-weight:700;">' + (d.sessions||0) + '</div></div>'
        + '<div style="background:#fff;padding:16px;text-align:center;"><div style="font-size:11px;color:#aaa;margin-bottom:4px;">Marker-Klicks</div><div style="font-size:22px;font-weight:700;color:#a855f7;">' + Object.values(d.markers||{}).reduce(function(s,v){return s+v;},0) + '</div></div>'
        + '</div>'

        + '<div style="padding:20px 24px;border-bottom:1px solid #f0f0f0;">'
        + '<div style="font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:#a855f7;margin-bottom:14px;">Meist geklickte Locations</div>'
        + markerBars + '</div>'

        + '<div style="padding:20px 24px;border-bottom:1px solid #f0f0f0;">'
        + '<div style="font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:#a855f7;margin-bottom:8px;">AR Link-Klicks</div>'
        + linkRows + '</div>'

        + '<div style="padding:20px 24px;">'
        + '<button onclick="if(confirm(\'Alle Daten löschen?\')){localStorage.removeItem(\'hydra_map_analytics\');document.getElementById(\'hydra-map-dash\').remove();}" style="width:100%;padding:10px;background:none;border:1px solid #e0e0e0;border-radius:8px;cursor:pointer;font-size:13px;color:#bbb;">Daten zurücksetzen</button>'
        + '</div>';

      document.body.appendChild(dash);
    }

    document.addEventListener('keydown', function(e) {
      if (e.shiftKey && e.key === 'M') openDashboard();
    });
  })();
</script>

<script>
  const map = L.map('map', { center: [37.3510, 23.4645], zoom: 15 });

      desc: "Artist details coming soon.",

    },
    {
      lat: 37.348514, lng: 23.468132,

    {

    },
    {
      lat: 37.346509, lng: 23.455226,
      title: "Hydra 180 40",
      tag: "AR Poster",

    },
    {
      lat: 37.350012, lng: 23.466726,
      title: "Exhibition Point",

      desc: "Artist details coming soon.",
      coords: "37.35001° N · 23.46673° E",
      url: "#",
      filled: false,
      style: "purple-white"
    },
    {
      lat: 37.301223, lng: 23.395489,
      title: "Exhibition Point",
      tag: "Exhibition Point",
      desc: "Artist details coming soon.",
      coords: "37.30122° N · 23.39549° E",
      url: "#",
      filled: false,
      style: "purple-black"
    },
    {
      lat: 37.334333, lng: 23.463215,
      title: "Moni Profitou Iliou",
      tag: "Exhibition Point",
      desc: "Artist details coming soon.",
      coords: "Moni Profitou Iliou, 180 40",
      url: "#",
      filled: false,
      style: "purple-black"
    }
  ];

  function markerSize(zoom) {
    const size = Math.round(8 + zoom * 1.5);
    return Math.max(14, Math.min(size, 44));
  }

  function makeIcon(filled, zoom, style) {
    const s = markerSize(zoom);
    const inner = Math.round(s * 0.68);
    let innerColor = '#1a1a1a';
    if (style === 'purple-white') innerColor = '#ffffff';
    return L.divIcon({
      className: '',
      html: `<div class="marker-outer" style="width:${s}px;height:${s}px;border-width:${Math.max(2,Math.round(s*0.08))}px"><div class="marker-inner" style="width:${inner}px;height:${inner}px;background:${innerColor}"></div></div>`,
      iconSize: [s, s],
      iconAnchor: [s/2, s/2],
      popupAnchor: [0, -(s/2 + 4)]
    });
  }

  const markers = [];

  locations.forEach((loc, i) => {
    const marker = L.marker([loc.lat, loc.lng], { icon: makeIcon(loc.filled, map.getZoom(), loc.style) }).addTo(map);

    // ── Tracker: Marker-Klick ──
    marker.on('click', function() {
      if (window._mapTrack) window._mapTrack.markerClick(loc.title, loc.tag, loc.coords);
    });

    const hasLink = loc.url && loc.url !== '#';
    const btnHtml = hasLink
      ? `<a class="ar-btn" href="${loc.url}" target="_blank" onclick="if(window._mapTrack)window._mapTrack.linkClick('${loc.title} · ${loc.tag}','${loc.url}')">↗ AR Experience öffnen</a>`
      : `<div style="font-size:11px;color:rgba(26,26,26,0.35);text-align:center;padding:10px 0;letter-spacing:0.08em;text-transform:uppercase;">Coming Soon</div>`;

    marker.bindPopup(`
      <div class="popup-bar"></div>
      <div class="popup-inner">
        <div class="popup-tag">${loc.tag}</div>
        <h2>${loc.title}</h2>
        <p>${loc.desc}</p>
        <div class="popup-coords">📍 ${loc.coords}</div>
        ${btnHtml}
      </div>
    `, { maxWidth: 280 });

    markers.push({ marker, filled: loc.filled, style: loc.style });
    if (i === 0) setTimeout(() => marker.openPopup(), 800);
  });

  map.on('zoomend', () => {
    const z = map.getZoom();
    markers.forEach(({ marker, filled, style }) => {
      marker.setIcon(makeIcon(filled, z, style));
    });
  });

  let myMarker = null;

  const myIcon = L.divIcon({
    className: '',
    html: `<div class="my-location-dot"></div>`,
    iconSize: [18, 18],
    iconAnchor: [9, 9],
  });

  if (navigator.geolocation) {
    navigator.geolocation.watchPosition(pos => {
      const { latitude: lat, longitude: lng } = pos.coords;
      if (!myMarker) {
        myMarker = L.marker([lat, lng], { icon: myIcon, zIndexOffset: 1000 }).addTo(map);
      } else {
        myMarker.setLatLng([lat, lng]);
      }
    }, null, { enableHighAccuracy: true, maximumAge: 3000, timeout: 10000 });
  }

  document.getElementById('locateBtn').addEventListener('click', () => {
    if (myMarker) map.setView(myMarker.getLatLng(), 17);
  });

  const legendEl = document.createElement('div');
  legendEl.className = 'legend';
  legendEl.innerHTML = `
    <div class="legend-title">Legende</div>
    <div class="legend-item"><span class="legend-dot"></span> Exhibition Point</div>
    <div class="legend-item"><span class="legend-dot white"></span> AR Groupshow</div>
    <div class="legend-item"><span class="legend-dot blue"></span> Mein Standort</div>
  `;
  document.getElementById('map').appendChild(legendEl);
</script>

</body>
