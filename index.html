<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <title>AR Map – Hydra</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #ffffff;
      --dark: #1a1a1a;
      --text-muted: rgba(26,26,26,0.45);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--dark);
      font-family: 'DM Sans', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    header {
      position: relative;
      z-index: 1000;
      padding: 16px 20px;
      background: #fff;
      border-bottom: 1px solid rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .header-text h1 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--dark);
    }
    .header-text p {
      font-size: 11px;
      font-weight: 400;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      margin-top: 1px;
    }
    #map { flex: 1; width: 100%; position: relative; }
    .locate-btn {
      position: absolute;
      bottom: 100px;
      right: 14px;
      z-index: 800;
      width: 44px;
      height: 44px;
      background: #fff;
      border: none;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: transform 0.15s;
    }
    .locate-btn:active { transform: scale(0.93); }
    .leaflet-popup-content-wrapper {
      background: #fff !important;
      border: none !important;
      border-radius: 16px !important;
      box-shadow: 0 8px 40px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06) !important;
      color: var(--dark) !important;
      font-family: 'DM Sans', sans-serif !important;
      padding: 0 !important;
      overflow: hidden;
    }
    .leaflet-popup-content { margin: 0 !important; }
    .leaflet-popup-tip-container { display: none; }
    .leaflet-popup-close-button {
      color: #1a1a1a !important;
      font-size: 20px !important;
      top: 12px !important;
      right: 14px !important;
      font-weight: 300 !important;
    }
    .popup-bar { height: 4px; background: linear-gradient(90deg, #ff6ec7, #a855f7, #22d3ee); }
    .popup-inner { padding: 16px 18px 18px; min-width: 230px; }
    .popup-tag {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .popup-inner h2 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--dark);
      margin-bottom: 6px;
    }
    .popup-inner p {
      font-size: 13px;
      color: rgba(26,26,26,0.6);
      margin-bottom: 12px;
      line-height: 1.5;
    }
    .popup-coords {
      font-size: 10px;
      color: var(--text-muted);
      margin-bottom: 14px;
      font-weight: 500;
    }
    .ar-btn {
      display: block;
      width: 100%;
      padding: 13px;
      background: var(--dark);
      color: #fff;
      text-align: center;
      text-decoration: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.05em;
      border-radius: 10px;
      transition: opacity 0.2s;
    }
    .ar-btn:hover { opacity: 0.8; }
    .marker-outer {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #a855f7;
      border: 3px solid #1a1a1a;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.15s ease;
    }
    .marker-outer:active { transform: scale(0.88); }
    .marker-inner {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #1a1a1a;
      pointer-events: none;
    }
    .my-location-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #3b82f6;
      border: 3px solid #fff;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.3);
      animation: pulse-blue 2s ease-in-out infinite;
    }
    @keyframes pulse-blue {
      0%, 100% { box-shadow: 0 0 0 3px rgba(59,130,246,0.3); }
      50% { box-shadow: 0 0 0 10px rgba(59,130,246,0.0); }
    }
    .legend {
      position: absolute;
      bottom: 20px;
      left: 14px;
      z-index: 800;
      background: #fff;
      border-radius: 12px;
      padding: 12px 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .legend-title {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
      font-size: 12px;
      font-weight: 500;
      color: var(--dark);
    }
    .legend-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #a855f7;
      border: 2px solid #1a1a1a;
      box-sizing: border-box;
      flex-shrink: 0;
    }
    .legend-dot.white {
      background: #fff;
      border: 2px solid #a855f7;
    }
    .legend-dot.blue {
      background: #3b82f6;
      border: 2px solid #fff;
      box-shadow: 0 0 0 2px rgba(59,130,246,0.4);
    }
    .leaflet-tile { filter: grayscale(1) brightness(1.05); }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 60 44" fill="none" xmlns="http://www.w3.org/2000/svg" width="38" height="38">
      <defs>
        <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#ff6ec7"/>
          <stop offset="50%" stop-color="#a855f7"/>
          <stop offset="100%" stop-color="#22d3ee"/>
        </linearGradient>
      </defs>
      <circle cx="22" cy="22" r="21" fill="#1a1a1a"/>
      <circle cx="38" cy="22" r="20" fill="none" stroke="url(#g)" stroke-width="2.5"/>
    </svg>
  </div>
  <div class="header-text">
    <h1>AR Map – Hydra</h1>
    <p>DIGITALBOHEMIANS · AUGMENTED REALITY</p>
  </div>
</header>

<div id="map"></div>
<button class="locate-btn" id="locateBtn" title="Zu meinem Standort">🎯</button>

<script>
  // ── Hydra Map · Analytics Tracker · Google Sheets ──
  var SHEET_URL = 'https://script.google.com/macros/s/AKfycby8ymlV-RJx_Z-swmgJCR4YOpE4Fq4ZsLZIIgnqm1u4uRzOGo2c8Ew4W-WmCLrn4uln/exec';

  function track(typ, element, details) {
    try {
      var params = new URLSearchParams({
        seite: 'Map',
        typ: typ,
        element: element || '',
        details: details || '',
        url: ''
      });
      fetch(SHEET_URL + '?' + params.toString(), { mode: 'no-cors' }).catch(function(){});
    } catch(e) {}
  }

  // Seitenaufruf tracken
  track('Seitenaufruf', 'Map', navigator.language || '');
</script>

<script>
  const map = L.map('map', { center: [37.3510, 23.4645], zoom: 15 });

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap', maxZoom: 19
  }).addTo(map);

  const locations = [
    {
      lat: 37.35158, lng: 23.46232,
      title: "Exhibition Point",
      tag: "Physische Ausstellung",
      desc: "Artist details coming soon.",
      coords: "37.35158° N · 23.46232° E",
      url: "https://digitalbohemians.github.io/ar3d-location/",
      filled: true
    },
    {
      lat: 37.35033, lng: 23.46693,
      title: "Exhibition Point",
      tag: "AR Poster",
      desc: "Artist details coming soon.",
      coords: "37.35033° N · 23.46693° E",
      url: "https://digitalbohemians.github.io/AR-Hydra/",
      filled: false
    },
    { lat: 37.353243, lng: 23.480410, title: "Exhibition Point", tag: "AR Poster", desc: "Artist details coming soon.", coords: "37.35324° N · 23.48041° E", url: "#", filled: false, style: "purple-black" },
    { lat: 37.353844, lng: 23.475182, title: "Exhibition Point", tag: "AR Poster", desc: "Artist details coming soon.", coords: "37.35384° N · 23.47518° E", url: "#", filled: false, style: "purple-black" },
    { lat: 37.353013, lng: 23.467189, title: "Exhibition Point", tag: "AR Poster", desc: "Artist details coming soon.", coords: "37.35301° N · 23.46719° E", url: "#", filled: false, style: "purple-black" },
    { lat: 37.352643, lng: 23.466445, title: "Exhibition Point", tag: "Interaktive AR Gruppenausstellung", desc: "Artist details coming soon.", coords: "37.35264° N · 23.46645° E", url: "#", filled: false, style: "purple-white" },
    { lat: 37.348514, lng: 23.468132, title: "Exhibition Point", tag: "AR Poster", desc: "Artist details coming soon.", coords: "37.34851° N · 23.46813° E", url: "#", filled: false, style: "purple-black" },
    { lat: 37.348126, lng: 23.458214, title: "Exhibition Point", tag: "AR Poster", desc: "Artist details coming soon.", coords: "37.34813° N · 23.45821° E", url: "#", filled: false, style: "purple-black" },
    { lat: 37.347824, lng: 23.457589, title: "Exhibition Point", tag: "AR Poster", desc: "Artist details coming soon.", coords: "37.34782° N · 23.45759° E", url: "#", filled: false, style: "purple-black" },
    { lat: 37.346509, lng: 23.455226, title: "Hydra 180 40", tag: "AR Poster", desc: "Artist details coming soon.", coords: "37.34651° N · 23.45523° E", url: "#", filled: false, style: "purple-black" },
    { lat: 37.344494, lng: 23.447875, title: "Exhibition Point", tag: "AR Poster", desc: "Artist details coming soon.", coords: "37.34449° N · 23.44788° E", url: "#", filled: false, style: "purple-black" },
    { lat: 37.343735, lng: 23.446410, title: "Taverna Marina", tag: "AR Poster", desc: "Artist details coming soon.", coords: "Vlichou, Vlichos 180 40", url: "#", filled: false, style: "purple-black" },
    { lat: 37.337666, lng: 23.439982, title: "Exhibition Point", tag: "AR Poster", desc: "Artist details coming soon.", coords: "37.33767° N · 23.43998° E", url: "#", filled: false, style: "purple-black" },
    { lat: 37.346618, lng: 23.459154, title: "Exhibition Point", tag: "AR Poster", desc: "Artist details coming soon.", coords: "37.34662° N · 23.45915° E", url: "#", filled: false, style: "purple-black" },
    { lat: 37.350012, lng: 23.466726, title: "Exhibition Point", tag: "Physische Ausstellung", desc: "Artist details coming soon.", coords: "37.35001° N · 23.46673° E", url: "#", filled: false, style: "purple-white" },
    { lat: 37.301223, lng: 23.395489, title: "Exhibition Point", tag: "Exhibition Point", desc: "Artist details coming soon.", coords: "37.30122° N · 23.39549° E", url: "#", filled: false, style: "purple-black" },
    { lat: 37.334333, lng: 23.463215, title: "Moni Profitou Iliou", tag: "Exhibition Point", desc: "Artist details coming soon.", coords: "Moni Profitou Iliou, 180 40", url: "#", filled: false, style: "purple-black" }
  ];

  function markerSize(zoom) {
    const size = Math.round(8 + zoom * 1.5);
    return Math.max(14, Math.min(size, 44));
  }

  function makeIcon(filled, zoom, style) {
    const s = markerSize(zoom);
    const inner = Math.round(s * 0.68);
    let innerColor = '#1a1a1a';
    if (style === 'purple-white') innerColor = '#ffffff';
    return L.divIcon({
      className: '',
      html: `<div class="marker-outer" style="width:${s}px;height:${s}px;border-width:${Math.max(2,Math.round(s*0.08))}px"><div class="marker-inner" style="width:${inner}px;height:${inner}px;background:${innerColor}"></div></div>`,
      iconSize: [s, s],
      iconAnchor: [s/2, s/2],
      popupAnchor: [0, -(s/2 + 4)]
    });
  }

  const markers = [];

  locations.forEach((loc, i) => {
    const marker = L.marker([loc.lat, loc.lng], { icon: makeIcon(loc.filled, map.getZoom(), loc.style) }).addTo(map);

    // ── Marker-Klick tracken ──
    marker.on('click', function() {
      track('Marker-Klick', loc.title, loc.tag);
    });

    const hasLink = loc.url && loc.url !== '#';
    const btnHtml = hasLink
      ? `<a class="ar-btn" href="${loc.url}" target="_blank" onclick="track('AR-Link-Klick','${loc.title} · ${loc.tag}','${loc.url}')">↗ AR Experience öffnen</a>`
      : `<div style="font-size:11px;color:rgba(26,26,26,0.35);text-align:center;padding:10px 0;letter-spacing:0.08em;text-transform:uppercase;">Coming Soon</div>`;

    marker.bindPopup(`
      <div class="popup-bar"></div>
      <div class="popup-inner">
        <div class="popup-tag">${loc.tag}</div>
        <h2>${loc.title}</h2>
        <p>${loc.desc}</p>
        <div class="popup-coords">📍 ${loc.coords}</div>
        ${btnHtml}
      </div>
    `, { maxWidth: 280 });

    markers.push({ marker, filled: loc.filled, style: loc.style });
    if (i === 0) setTimeout(() => marker.openPopup(), 800);
  });

  map.on('zoomend', () => {
    const z = map.getZoom();
    markers.forEach(({ marker, filled, style }) => {
      marker.setIcon(makeIcon(filled, z, style));
    });
  });

  let myMarker = null;
  const myIcon = L.divIcon({
    className: '',
    html: `<div class="my-location-dot"></div>`,
    iconSize: [18, 18],
    iconAnchor: [9, 9],
  });

  if (navigator.geolocation) {
    navigator.geolocation.watchPosition(pos => {
      const { latitude: lat, longitude: lng } = pos.coords;
      if (!myMarker) {
        myMarker = L.marker([lat, lng], { icon: myIcon, zIndexOffset: 1000 }).addTo(map);
      } else {
        myMarker.setLatLng([lat, lng]);
      }
    }, null, { enableHighAccuracy: true, maximumAge: 3000, timeout: 10000 });
  }

  document.getElementById('locateBtn').addEventListener('click', () => {
    if (myMarker) map.setView(myMarker.getLatLng(), 17);
  });

  const legendEl = document.createElement('div');
  legendEl.className = 'legend';
  legendEl.innerHTML = `
    <div class="legend-title">Legende</div>
    <div class="legend-item"><span class="legend-dot"></span> Exhibition Point</div>
    <div class="legend-item"><span class="legend-dot white"></span> AR Groupshow</div>
    <div class="legend-item"><span class="legend-dot blue"></span> Mein Standort</div>
  `;
  document.getElementById('map').appendChild(legendEl);
</script>

</body>
</html>
