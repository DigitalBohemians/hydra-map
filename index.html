<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <title>AR Map – Hydra</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #ffffff;
      --dark: #1a1a1a;
      --text-muted: rgba(26,26,26,0.45);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--dark);
      font-family: 'DM Sans', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    header {
      position: relative;
      z-index: 1000;
      padding: 16px 20px;
      background: #fff;
      border-bottom: 1px solid rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .header-text h1 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--dark);
    }
    .header-text p {
      font-size: 11px;
      font-weight: 400;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      margin-top: 1px;
    }
    #map { flex: 1; width: 100%; position: relative; }
    .leaflet-popup-content-wrapper {
      background: #fff !important;
      border: none !important;
      border-radius: 16px !important;
      box-shadow: 0 8px 40px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06) !important;
      color: var(--dark) !important;
      font-family: 'DM Sans', sans-serif !important;
      padding: 0 !important;
      overflow: hidden;
    }
    .leaflet-popup-content { margin: 0 !important; }
    .leaflet-popup-tip-container { display: none; }
    .leaflet-popup-close-button {
      color: #1a1a1a !important;
      font-size: 20px !important;
      top: 12px !important;
      right: 14px !important;
      font-weight: 300 !important;
    }
    .popup-bar { height: 4px; background: linear-gradient(90deg, #a855f7, #a855f7, #22d3ee); }
    .popup-inner { padding: 16px 18px 18px; min-width: 230px; }
    .popup-tag {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .popup-inner h2 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--dark);
      margin-bottom: 6px;
    }
    .popup-inner p {
      font-size: 13px;
      color: rgba(26,26,26,0.6);
      margin-bottom: 12px;
      line-height: 1.5;
    }
    .popup-coords {
      font-size: 10px;
      color: var(--text-muted);
      margin-bottom: 14px;
      font-weight: 500;
    }
    .marker-outer {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #a855f7;
      border: 3px solid #1a1a1a;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.15s ease;
    }
    .marker-outer:active { transform: scale(0.88); }
    .marker-inner {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #1a1a1a;
      pointer-events: none;
    }
    .legend {
      position: absolute;
      bottom: 20px;
      left: 14px;
      z-index: 800;
      background: #fff;
      border-radius: 12px;
      padding: 12px 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .legend-title {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
      font-size: 12px;
      font-weight: 500;
      color: var(--dark);
    }
    .legend-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #a855f7;
      border: 2px solid #1a1a1a;
      box-sizing: border-box;
      flex-shrink: 0;
    }
    .legend-dot.white {
      background: #fff;
      border: 2px solid #a855f7;
    }
    .legend-dot.blue {
      background: #22d3ee;
      border: 2px solid #fff;
      box-shadow: 0 0 0 2px rgba(59,130,246,0.4);
    }
    .leaflet-tile { filter: grayscale(1) brightness(1.05); }
  </style>
</head>

  function track(typ, element, details) {
    try {
      var params = new URLSearchParams({
        seite: 'Map',
        typ: typ,
        element: element || '',
        details: details || '',
        url: ''
      });
      fetch(SHEET_URL + '?' + params.toString(), { mode: 'no-cors' }).catch(function(){});
    } catch(e) {}
  }

  // Seitenaufruf tracken
  track('Seitenaufruf', 'Map', navigator.language || '');
</script>

  ];

  function markerSize(zoom) {
    const size = Math.round(8 + zoom * 1.5);
    return Math.max(14, Math.min(size, 44));
  }

  function makeIcon(filled, zoom, style) {
    const s = markerSize(zoom);
    const inner = Math.round(s * 0.68);
    let outerColor = '#a855f7';
    if (style === 'blue-black') outerColor = '#22d3ee';
    if (style === 'green-black') outerColor = '#22c55e';
    if (style === 'grey-black') outerColor = '#9ca3af';
    let innerColor = '#1a1a1a';
    if (style === 'purple-white') innerColor = '#ffffff';
    if (style === 'grey-black') innerColor = '#6b7280';
    return L.divIcon({
      className: '',
      html: `<div class="marker-outer" style="width:${s}px;height:${s}px;border-width:${Math.max(2,Math.round(s*0.08))}px;background:${outerColor} !important"><div class="marker-inner" style="width:${inner}px;height:${inner}px;background:${innerColor}"></div></div>`,
      iconSize: [s, s],
      iconAnchor: [s/2, s/2],
      popupAnchor: [0, -(s/2 + 4)]
    });
  }

  const markers = [];

  locations.forEach((loc, i) => {
    const marker = L.marker([loc.lat, loc.lng], { icon: makeIcon(loc.filled, map.getZoom(), loc.style) }).addTo(map);

    marker.on('click', function() {
      track('Marker-Klick', loc.title, loc.tag);
    });

    const btnHtml = loc.arlink
      ? `<div style="margin-bottom:10px;font-size:11px;color:rgba(26,26,26,0.5);text-align:center;letter-spacing:0.04em;">📷 Point camera to poster · Unmute for sound<br>Scan QR Code or open this link:</div>
         <a class="ar-btn" href="${loc.arlink}" target="_blank" style="display:flex;align-items:center;justify-content:center;gap:10px;font-size:15px;padding:15px;" onclick="track('AR-Link-Klick','${loc.title}','${loc.arlink}')"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg> Open AR Experience</a>`
      : loc.instagram
      ? `<a class="ar-btn" href="${loc.url}" target="_blank" style="display:flex;align-items:center;justify-content:center;gap:8px;" onclick="track('Instagram-Klick','${loc.title}','${loc.url}')"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg> Book your visit via Instagram</a>`
      : loc.snaplink
      ? `<a class="ar-btn" href="${loc.url}" target="_blank" style="display:flex;align-items:center;justify-content:center;gap:10px;font-size:16px;padding:16px;" onclick="track('Snap-Klick','${loc.title}','${loc.url}')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg> Open Group Show</a>`
      : `<div style="font-size:11px;color:rgba(26,26,26,0.35);text-align:center;padding:10px 0;letter-spacing:0.08em;text-transform:uppercase;">Coming Soon</div>`;

    marker.bindPopup(`
      <div class="popup-bar"></div>
      <div class="popup-inner" style="text-align:left;">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;margin-top:8px;padding-right:28px;">
          <div class="popup-tag" style="${loc.style === 'green-black' ? 'color:#22c55e;' : loc.instagram ? 'color:#22d3ee;' : ''}margin-bottom:0;">${loc.tag}</div>
        </div>
        <h2 style="text-align:left;">${loc.title}</h2>
        ${loc.subtitle ? `<p style="font-size:12px;font-weight:500;color:rgba(26,26,26,0.45);margin-top:2px;margin-bottom:4px;letter-spacing:0.01em;text-align:left;">${loc.subtitle}</p>` : ''}
        ${loc.coords ? `<div style="font-size:12px;font-weight:700;color:rgba(26,26,26,0.5);margin-top:10px;margin-bottom:4px;letter-spacing:0.08em;text-transform:uppercase;">📍 ${loc.coords}</div>` : ''}
        ${loc.hint ? `<p style="font-size:12px;color:rgba(26,26,26,0.5);margin-bottom:10px;font-style:italic;text-align:left;">${loc.hint}</p>` : ''}
        ${loc.booktitle ? `<p style="font-size:12px;font-weight:600;color:rgba(26,26,26,0.7);margin-bottom:10px;text-align:left;">${loc.booktitle}</p>` : ''}
        ${loc.desc ? `<p style="text-align:left;">${loc.desc}</p>` : ''}
        ${btnHtml}
      </div>
    `, { maxWidth: 290 });

    markers.push({ marker, filled: loc.filled, style: loc.style });
  });

  map.on('zoomend', () => {
    const z = map.getZoom();
    markers.forEach(({ marker, filled, style }) => {
      marker.setIcon(makeIcon(filled, z, style));
    });
  });

  const legendEl = document.createElement('div');
  legendEl.className = 'legend';
  legendEl.innerHTML = `
    <div class="legend-title">Legend</div>
    <div class="legend-item"><span class="legend-dot" style="background:#22c55e;border-color:#1a1a1a"></span> AR Ready</div>
    <div class="legend-item"><span class="legend-dot"></span> Exhibition Point</div>
    <div class="legend-item"><span class="legend-dot white"></span> AR Groupshow</div>
    <div class="legend-item"><span class="legend-dot" style="background:#22d3ee;border-color:#1a1a1a"></span> Open Studios & Exhibitions</div>
  `;
  document.getElementById('map').appendChild(legendEl);
</script>
