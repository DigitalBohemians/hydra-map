<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <title>AR Map – Hydra</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #ffffff;
      --dark: #1a1a1a;
      --grad: linear-gradient(135deg, #ff6ec7, #a855f7, #22d3ee);
      --text-muted: rgba(26,26,26,0.45);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--dark);
      font-family: 'DM Sans', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      position: relative;
      z-index: 1000;
      padding: 16px 20px;
      background: #fff;
      border-bottom: 1px solid rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo svg { width: 38px; height: 38px; }

    .header-text h1 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--dark);
    }

    .header-text p {
      font-size: 11px;
      font-weight: 400;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      margin-top: 1px;
    }

    #map { flex: 1; width: 100%; position: relative; }

    /* Locate Button */
    .locate-btn {
      position: absolute;
      bottom: 100px;
      right: 14px;
      z-index: 800;
      width: 44px;
      height: 44px;
      background: #fff;
      border: none;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: transform 0.15s;
    }

    .locate-btn:active { transform: scale(0.93); }

    /* Popup */
    .leaflet-popup-content-wrapper {
      background: #fff !important;
      border: none !important;
      border-radius: 16px !important;
      box-shadow: 0 8px 40px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06) !important;
      color: var(--dark) !important;
      font-family: 'DM Sans', sans-serif !important;
      padding: 0 !important;
      overflow: hidden;
    }

    .leaflet-popup-content { margin: 0 !important; }
    .leaflet-popup-tip-container { display: none; }
    .leaflet-popup-close-button {
      color: #1a1a1a !important;
      font-size: 20px !important;
      top: 12px !important;
      right: 14px !important;
      font-weight: 300 !important;
    }

    .popup-bar {
      height: 4px;
      background: linear-gradient(90deg, #ff6ec7, #a855f7, #22d3ee);
    }

    .popup-inner { padding: 16px 18px 18px; min-width: 230px; }

    .popup-tag {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .popup-inner h2 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--dark);
      margin-bottom: 6px;
    }

    .popup-inner p {
      font-size: 13px;
      color: rgba(26,26,26,0.6);
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .popup-coords {
      font-size: 10px;
      color: var(--text-muted);
      margin-bottom: 14px;
      font-weight: 500;
    }

    .ar-btn {
      display: block;
      width: 100%;
      padding: 13px;
      background: var(--dark);
      color: #fff;
      text-align: center;
      text-decoration: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.05em;
      border-radius: 10px;
      transition: opacity 0.2s;
    }

    .ar-btn:hover { opacity: 0.8; }

    /* AR Marker */
    .marker-outer {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff6ec7, #a855f7, #22d3ee);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .marker-inner {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #fff;
    }

    .marker-outer.filled .marker-inner { background: var(--dark); }

    /* Mein Standort Punkt */
    .my-location-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #3b82f6;
      border: 3px solid #fff;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.3);
      animation: pulse-blue 2s ease-in-out infinite;
    }

    @keyframes pulse-blue {
      0%, 100% { box-shadow: 0 0 0 3px rgba(59,130,246,0.3); }
      50% { box-shadow: 0 0 0 8px rgba(59,130,246,0.0); }
    }

    /* Legend */
    .legend {
      position: absolute;
      bottom: 20px;
      left: 14px;
      z-index: 800;
      background: #fff;
      border-radius: 12px;
      padding: 12px 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    .legend-title {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
      font-size: 12px;
      font-weight: 500;
      color: var(--dark);
    }

    .legend-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff6ec7, #a855f7, #22d3ee);
      flex-shrink: 0;
    }

    .legend-dot.outline {
      background: #fff;
      border: 2px solid #a855f7;
    }

    .legend-dot.blue {
      background: #3b82f6;
      border: 2px solid #fff;
      box-shadow: 0 0 0 2px rgba(59,130,246,0.4);
    }

    .leaflet-tile { filter: grayscale(1) brightness(1.05); }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 60 44" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#ff6ec7"/>
          <stop offset="50%" stop-color="#a855f7"/>
          <stop offset="100%" stop-color="#22d3ee"/>
        </linearGradient>
      </defs>
      <circle cx="22" cy="22" r="21" fill="#1a1a1a"/>
      <circle cx="38" cy="22" r="20" fill="none" stroke="url(#g)" stroke-width="2.5"/>
    </svg>
  </div>
  <div class="header-text">
    <h1>AR Map – Hydra</h1>
    <p>DIGITALBOHEMIANS · AUGMENTED REALITY</p>
  </div>
</header>

<div id="map"></div>

<button class="locate-btn" id="locateBtn" title="Mein Standort">📍</button>

<script>
  const map = L.map('map', { center: [37.3510, 23.4645], zoom: 15 });

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap', maxZoom: 19
  }).addTo(map);

  // AR Locations
  const locations = [
    {
      lat: 37.35158, lng: 23.46232,
      title: "Hydronetta",
      tag: "AR · Location 01",
      desc: "Erweiterte Realität direkt am Wasser der Hydronetta.",
      coords: "37.35158° N · 23.46232° E",
      url: "https://digitalbohemians.github.io/ar3d-location/",
      filled: true
    },
    {
      lat: 37.35033, lng: 23.46693,
      title: "Hydra Kunst",
      tag: "AR · Location 02",
      desc: "Die Kunst im Code – mitten im Herzen von Hydra.",
      coords: "37.35033° N · 23.46693° E",
      url: "https://digitalbohemians.github.io/AR-Hydra/",
      filled: false
    }
  ];

  locations.forEach((loc, i) => {
    const icon = L.divIcon({
      className: '',
      html: `<div class="marker-outer ${loc.filled ? 'filled' : ''}"><div class="marker-inner"></div></div>`,
      iconSize: [40, 40],
      iconAnchor: [20, 20],
      popupAnchor: [0, -24]
    });

    const marker = L.marker([loc.lat, loc.lng], { icon }).addTo(map);
    marker.bindPopup(`
      <div class="popup-bar"></div>
      <div class="popup-inner">
        <div class="popup-tag">${loc.tag}</div>
        <h2>${loc.title}</h2>
        <p>${loc.desc}</p>
        <div class="popup-coords">📍 ${loc.coords}</div>
        <a class="ar-btn" href="${loc.url}" target="_blank">▶ AR Starten</a>
      </div>
    `, { maxWidth: 280 });

    if (i === 0) setTimeout(() => marker.openPopup(), 800);
  });

  // Mein Standort – blauer Punkt, live tracking
  let myMarker = null;
  let watchId = null;

  const myIcon = L.divIcon({
    className: '',
    html: `<div class="my-location-dot"></div>`,
    iconSize: [18, 18],
    iconAnchor: [9, 9],
  });

  document.getElementById('locateBtn').addEventListener('click', () => {
    if (!navigator.geolocation) {
      alert('GPS nicht verfügbar auf diesem Gerät.');
      return;
    }

    // Wenn schon aktiv, stoppen
    if (watchId !== null) {
      navigator.geolocation.clearWatch(watchId);
      watchId = null;
      if (myMarker) { myMarker.remove(); myMarker = null; }
      document.getElementById('locateBtn').textContent = '📍';
      return;
    }

    document.getElementById('locateBtn').textContent = '🔵';

    watchId = navigator.geolocation.watchPosition(
      (pos) => {
        const { latitude: lat, longitude: lng } = pos.coords;

        if (!myMarker) {
          myMarker = L.marker([lat, lng], { icon: myIcon }).addTo(map);
          map.setView([lat, lng], 16);
        } else {
          myMarker.setLatLng([lat, lng]);
        }
      },
      (err) => {
        alert('GPS Fehler: ' + err.message);
      },
      { enableHighAccuracy: true, maximumAge: 3000, timeout: 10000 }
    );
  });

  // Legend
  const legendEl = document.createElement('div');
  legendEl.className = 'legend';
  legendEl.innerHTML = `
    <div class="legend-title">Legende</div>
    <div class="legend-item"><span class="legend-dot"></span> Hydronetta</div>
    <div class="legend-item"><span class="legend-dot outline"></span> Hydra Kunst</div>
    <div class="legend-item"><span class="legend-dot blue"></span> Mein Standort</div>
  `;
  document.getElementById('map').appendChild(legendEl);
</script>

</body>
</html>
